version: '3.3'

services:
  # 1. The Backend (Node.js + SQLite)
  kebundata-api:
    build: ./kebundata-backend
    restart: always
    ports:
      - "3000:3000"
    volumes:
      - ./backend-data:/app/data

  # 2. The Frontend (Nginx)
  kebundata-dashboard:
    image: nginx:alpine
    restart: always
    ports:
      - "8080:80"
    volumes:
      # CHANGED: Pointing to the new folder name
      - ./kebundata-frontend:/usr/share/nginx/html
