<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KebunData Enterprise</title>
    
    <!-- Libraries -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Theme Config -->
    <script>
        tailwind.config = {
            theme: { extend: { colors: { kebun: { 50: '#f0fdf4', 100: '#dcfce7', 600: '#16a34a', 800: '#166534' } } } }
        }
    </script>
</head>
<body class="bg-gray-50 text-gray-900 font-sans">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- SMART CONFIGURATION ---
        // Automatically determine the API URL based on the current browser address.
        const API_URL = `http://${window.location.hostname}:3000/api/posts`;

        // --- ICONS ---
        const Icons = {
            Menu: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>,
            Monitor: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>,
            Journal: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>,
            Share: () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>,
            Trash: () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path d="M3 6h18"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>,
            Database: () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/></svg>
        };

        // --- DATA LOGIC ---
        const DataService = {
            fetchPosts: async () => {
                try {
                    const res = await fetch(API_URL);
                    if (!res.ok) throw new Error('Failed');
                    return await res.json();
                } catch (e) { return null; }
            },
            addPost: async (post) => {
                await fetch(API_URL, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(post)
                });
            },
            deletePost: async (id) => {
                await fetch(`${API_URL}/${id}`, { method: 'DELETE' });
            }
        };

        // --- COMPONENTS ---

        // 1. Social Share Modal
        const ShareModal = ({ post, onClose }) => {
            const shareText = encodeURIComponent(`${post.title}\n\n${post.content}`);
            const shareUrl = encodeURIComponent(window.location.href);

            const platforms = [
                { name: 'WhatsApp', color: 'bg-green-500', url: `https://wa.me/?text=${shareText}` },
                { name: 'Facebook', color: 'bg-blue-600', url: `https://www.facebook.com/sharer/sharer.php?u=${shareUrl}&quote=${shareText}` },
                { name: 'X / Twitter', color: 'bg-black', url: `https://twitter.com/intent/tweet?text=${shareText}&url=${shareUrl}` }
            ];

            return (
                <div className="fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4 backdrop-blur-sm">
                    <div className="bg-white rounded-xl shadow-xl w-full max-w-sm overflow-hidden animate-fade-in">
                        <div className="p-4 border-b flex justify-between items-center bg-gray-50">
                            <h3 className="font-bold text-gray-700">Share Post</h3>
                            <button onClick={onClose} className="text-gray-400 hover:text-gray-600"><Icons.Menu /></button>
                        </div>
                        <div className="p-6 space-y-3">
                            <p className="text-sm text-gray-500 mb-4">Choose a platform to broadcast your update:</p>
                            {platforms.map(p => (
                                <a 
                                    key={p.name} 
                                    href={p.url} 
                                    target="_blank" 
                                    rel="noopener noreferrer"
                                    className={`block w-full text-center py-3 rounded-lg text-white font-medium hover:opacity-90 transition-opacity ${p.color}`}
                                    onClick={onClose}
                                >
                                    Share on {p.name}
                                </a>
                            ))}
                        </div>
                    </div>
                </div>
            );
        };

        // 2. Monitoring Page
        const MonitoringView = () => (
            <div className="space-y-6 animate-fade-in">
                <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <div className="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
                        <div className="text-gray-500 text-sm font-medium uppercase">Total Harvest</div>
                        <div className="text-3xl font-bold text-gray-800 mt-2">1,240 kg</div>
                        <div className="text-green-600 text-sm mt-2 flex items-center gap-1">▲ 12% vs last month</div>
                    </div>
                    <div className="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
                        <div className="text-gray-500 text-sm font-medium uppercase">Soil Moisture</div>
                        <div className="text-3xl font-bold text-blue-600 mt-2">68%</div>
                        <div className="text-gray-400 text-sm mt-2">Zone A - Optimal</div>
                    </div>
                    <div className="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
                        <div className="text-gray-500 text-sm font-medium uppercase">Active Sensors</div>
                        <div className="text-3xl font-bold text-purple-600 mt-2">24/25</div>
                        <div className="text-green-600 text-sm mt-2">All Systems Nominal</div>
                    </div>
                </div>
                
                <div className="bg-white p-8 rounded-xl shadow-sm border border-gray-100 text-center py-16">
                    <div className="text-gray-300 mb-4 text-4xl">📊</div>
                    <h3 className="text-lg font-semibold text-gray-600">Advanced Analytics</h3>
                    <p className="text-gray-400 max-w-md mx-auto mt-2">Live sensor graphs will appear here.</p>
                </div>
            </div>
        );

        // 3. Journal Page
        const JournalView = ({ posts, onDelete, onSubmit, isConnected, onShare }) => {
            const [newPost, setNewPost] = useState({ title: '', content: '', image: '', video: '' });

            const handleSubmit = (e) => {
                e.preventDefault();
                onSubmit(newPost);
                setNewPost({ title: '', content: '', image: '', video: '' });
            };

            return (
                <div className="max-w-3xl mx-auto">
                    <div className="bg-white p-6 rounded-xl shadow-sm border border-gray-100 mb-8">
                        <h2 className="text-lg font-bold mb-4 text-gray-800">New Journal Entry</h2>
                        <form onSubmit={handleSubmit} className="space-y-4">
                            <input 
                                className="w-full border p-3 rounded-lg focus:ring-2 focus:ring-green-500 outline-none" 
                                placeholder="Title (e.g., Harvesting Corn)" 
                                value={newPost.title} 
                                onChange={e => setNewPost({...newPost, title: e.target.value})} 
                            />
                            <textarea 
                                className="w-full border p-3 rounded-lg focus:ring-2 focus:ring-green-500 outline-none" 
                                placeholder="What happened on the farm today?" 
                                rows="3" 
                                value={newPost.content} 
                                onChange={e => setNewPost({...newPost, content: e.target.value})} 
                            />
                            <div className="grid grid-cols-2 gap-4">
                                <input className="border p-2 rounded text-sm" placeholder="Image URL (http://...)" value={newPost.image} onChange={e => setNewPost({...newPost, image: e.target.value})} />
                                <input className="border p-2 rounded text-sm" placeholder="Video/YouTube URL" value={newPost.video} onChange={e => setNewPost({...newPost, video: e.target.value})} />
                            </div>
                            <div className="flex justify-end">
                                <button disabled={!isConnected} className="bg-kebun-600 text-white px-6 py-2 rounded-lg font-bold hover:bg-kebun-800 transition disabled:opacity-50 disabled:cursor-not-allowed">
                                    {isConnected ? 'Publish Entry' : 'Offline'}
                                </button>
                            </div>
                        </form>
                    </div>

                    <div className="space-y-6">
                        {posts.map(post => (
                            <article key={post.id} className="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden hover:shadow-md transition">
                                <div className="p-6">
                                    <div className="flex justify-between items-start mb-4">
                                        <div>
                                            <h3 className="font-bold text-xl text-gray-900">{post.title}</h3>
                                            <div className="text-xs text-gray-400 mt-1">{new Date(post.date).toLocaleDateString()}</div>
                                        </div>
                                        <div className="flex gap-2">
                                            <button onClick={() => onShare(post)} className="text-gray-400 hover:text-blue-500 p-2 rounded-full hover:bg-blue-50 transition" title="Share">
                                                <Icons.Share />
                                            </button>
                                            <button onClick={() => onDelete(post.id)} className="text-gray-400 hover:text-red-500 p-2 rounded-full hover:bg-red-50 transition" title="Delete">
                                                <Icons.Trash />
                                            </button>
                                        </div>
                                    </div>
                                    <p className="text-gray-600 whitespace-pre-wrap leading-relaxed mb-4">{post.content}</p>
                                    {(post.image || post.video) && (
                                        <div className="mt-4 bg-gray-50 rounded-lg overflow-hidden border border-gray-100">
                                            {post.image && <img src={post.image} alt={post.title} className="w-full h-64 object-cover" onError={(e) => e.target.style.display='none'} />}
                                            {post.video && (
                                                <div className="p-2">
                                                    <div className="text-xs text-gray-400 mb-1 uppercase font-bold tracking-wider">Video Attachment</div>
                                                    <a href={post.video} target="_blank" className="text-blue-600 underline text-sm break-all">{post.video}</a>
                                                </div>
                                            )}
                                        </div>
                                    )}
                                </div>
                            </article>
                        ))}
                    </div>
                </div>
            );
        };

        // --- MAIN APP ---
        const App = () => {
            const [activeTab, setActiveTab] = useState('journal');
            const [posts, setPosts] = useState([]);
            const [isConnected, setIsConnected] = useState(false);
            const [sharePost, setSharePost] = useState(null); 

            const loadData = async () => {
                const data = await DataService.fetchPosts();
                if (data) {
                    setPosts(data.map(p => ({ id: p.ID, title: p.TITLE, content: p.CONTENT, image: p.IMAGE_URL, video: p.VIDEO_URL, date: p.CREATED_AT })));
                    setIsConnected(true);
                } else {
                    setIsConnected(false);
                }
            };

            // Auto-refresh every 5 seconds
            useEffect(() => { 
                loadData(); 
                const i = setInterval(loadData, 5000); 
                return () => clearInterval(i); 
            }, []);

            return (
                <div className="min-h-screen flex flex-col md:flex-row bg-gray-50">
                    <aside className="w-full md:w-64 bg-white border-r flex flex-col justify-between p-6 sticky top-0 md:h-screen z-10">
                        <div>
                            <div className="text-2xl font-black text-kebun-800 mb-8 flex items-center gap-2 tracking-tight">
                                <span className="bg-kebun-100 text-kebun-600 p-1.5 rounded-lg"><Icons.Monitor /></span> KebunData
                            </div>
                            <nav className="space-y-2">
                                <button onClick={() => setActiveTab('monitoring')} className={`w-full flex items-center gap-3 px-4 py-3 rounded-lg font-medium transition ${activeTab === 'monitoring' ? 'bg-kebun-50 text-kebun-800' : 'text-gray-500 hover:bg-gray-50'}`}>
                                    <Icons.Monitor /> Data Monitoring
                                </button>
                                <button onClick={() => setActiveTab('journal')} className={`w-full flex items-center gap-3 px-4 py-3 rounded-lg font-medium transition ${activeTab === 'journal' ? 'bg-kebun-50 text-kebun-800' : 'text-gray-500 hover:bg-gray-50'}`}>
                                    <Icons.Journal /> Farm Journal
                                </button>
                            </nav>
                        </div>

                        <div className="mt-8 md:mt-0">
                            {/* Simple Status Badge (No Click) */}
                            <div className={`w-full flex items-center justify-center px-3 py-2 rounded text-xs font-medium border ${isConnected ? 'bg-blue-50 text-blue-700 border-blue-200' : 'bg-red-50 text-red-700 border-red-200'}`}>
                                <span className="flex items-center gap-2"><Icons.Database /> {isConnected ? 'System Online' : 'System Offline'}</span>
                            </div>
                        </div>
                    </aside>

                    <main className="flex-1 p-4 md:p-10 h-auto md:h-screen overflow-y-auto">
                        <header className="mb-8">
                            <h1 className="text-3xl font-bold text-gray-900">{activeTab === 'monitoring' ? 'Data Monitoring' : 'Farm Journal'}</h1>
                            <p className="text-gray-500">{activeTab === 'monitoring' ? 'Real-time sensor data from your farm.' : 'Share your farming journey with the world.'}</p>
                        </header>

                        {activeTab === 'monitoring' ? <MonitoringView /> : 
                            <JournalView 
                                posts={posts} 
                                isConnected={isConnected} 
                                onSubmit={async (post) => { await DataService.addPost(post); loadData(); }}
                                onDelete={async (id) => { if(confirm('Delete?')) { await DataService.deletePost(id); loadData(); } }}
                                onShare={(post) => setSharePost(post)}
                            />
                        }
                    </main>

                    {sharePost && <ShareModal post={sharePost} onClose={() => setSharePost(null)} />}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
