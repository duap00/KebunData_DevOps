<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KebunData Dashboard (Oracle Connected)</title>
    
    <!-- Libraries -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <script>
        tailwind.config = {
            theme: { extend: { colors: { kebun: { 50: '#f0fdf4', 600: '#16a34a', 800: '#166534' } } } }
        }
    </script>
</head>
<body class="bg-gray-50 text-gray-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- DATA SERVICE (Refactored to accept dynamic URL) ---
        const DataService = {
            fetchPosts: async (url) => {
                try {
                    const response = await fetch(url);
                    if (!response.ok) throw new Error(`Server Error: ${response.status}`);
                    return await response.json();
                } catch (error) {
                    console.error("Fetch Error:", error);
                    return null;
                }
            },
            addPost: async (url, post) => {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(post)
                });
                if (!response.ok) throw new Error('Failed to add post');
            },
            deletePost: async (url, id) => {
                 await fetch(`${url}/${id}`, { method: 'DELETE' });
            }
        };

        // --- ICONS ---
        const IconMenu = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>;
        const IconDatabase = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/></svg>;
        const IconServerOff = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="1" y1="1" x2="23" y2="23"/><rect x="2" y="2" width="20" height="8" rx="2" ry="2" transform="rotate(180 12 6)"/><line x1="6" y1="6" x2="6.01" y2="6"/><line x1="18" y1="6" x2="18.01" y2="6"/><path d="M2 14h2"/><path d="M22 14h-2"/><path d="M12 12v8"/><path d="M2 22h20"/></svg>;
        const IconTrash = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>;
        const IconSettings = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.1a2 2 0 0 1-1-1.74v-.47a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>;

        const StatusBadge = ({ connected, onClick }) => (
            <button onClick={onClick} className={`inline-flex items-center gap-1.5 px-3 py-1 rounded-full text-xs font-medium border transition-colors hover:opacity-80 ${connected ? 'bg-blue-50 text-blue-700 border-blue-200' : 'bg-red-50 text-red-700 border-red-200'}`}>
                {connected ? <><IconDatabase /><span className="truncate">Oracle DB Connected</span></> : <><IconServerOff /><span>API Offline</span></>}
            </button>
        );

        const App = () => {
            // Default to localhost, but allow user override in UI
            const [apiUrl, setApiUrl] = useState('http://localhost:3000/api/posts');
            const [showConfig, setShowConfig] = useState(false);
            const [posts, setPosts] = useState([]);
            const [isConnected, setIsConnected] = useState(false);
            const [newPost, setNewPost] = useState({ title: '', content: '' });

            const loadData = async () => {
                const data = await DataService.fetchPosts(apiUrl);
                if (data) {
                    const mapped = data.map(p => ({
                        id: p.ID, 
                        title: p.TITLE, 
                        content: p.CONTENT, 
                        date: p.CREATED_AT
                    }));
                    setPosts(mapped);
                    setIsConnected(true);
                } else {
                    setIsConnected(false);
                }
            };

            // Check connection on mount and when URL changes
            useEffect(() => {
                loadData();
                const interval = setInterval(loadData, 5000); 
                return () => clearInterval(interval);
            }, [apiUrl]);

            const handleSubmit = async (e) => {
                e.preventDefault();
                try {
                    await DataService.addPost(apiUrl, newPost);
                    setNewPost({ title: '', content: '' });
                    loadData();
                } catch(e) {
                    alert("Failed to save. Check your connection.");
                }
            };

            const handleDelete = async (id) => {
                if(confirm('Delete?')) {
                    await DataService.deletePost(apiUrl, id);
                    loadData();
                }
            };

            return (
                <div className="min-h-screen flex flex-col md:flex-row font-sans">
                    <aside className="w-full md:w-64 bg-white border-r p-6 flex flex-col justify-between">
                        <div>
                            <div className="text-xl font-bold text-gray-800 mb-8 flex items-center gap-2">
                                <span className="bg-green-100 text-green-700 p-1 rounded">KD</span> KebunData
                            </div>
                            
                            {/* Configuration Panel - Helpful for debugging "Failed to Fetch" */}
                            <div className={`text-sm mb-4 bg-gray-50 p-3 rounded border ${showConfig ? 'block' : 'hidden'}`}>
                                <label className="block text-gray-500 text-xs uppercase font-bold mb-1">Backend API URL</label>
                                <input 
                                    className="w-full border p-1 rounded text-xs mb-2" 
                                    value={apiUrl} 
                                    onChange={(e) => setApiUrl(e.target.value)} 
                                />
                                <div className="text-xs text-gray-400">
                                    Tip: If on a different device, use the server's IP address (e.g., http://192.168.1.5:3000/api/posts)
                                </div>
                            </div>
                        </div>

                        <div className="mt-4 md:mt-0">
                            <div className="flex items-center justify-between mb-2">
                                <span className="text-xs font-bold text-gray-400 uppercase">System Status</span>
                                <button onClick={() => setShowConfig(!showConfig)} className="text-gray-400 hover:text-gray-600">
                                    <IconSettings />
                                </button>
                            </div>
                            <StatusBadge connected={isConnected} onClick={() => setShowConfig(!showConfig)} />
                        </div>
                    </aside>
                    
                    <main className="flex-1 p-8 bg-gray-50 h-screen overflow-y-auto">
                        <header className="mb-8 flex justify-between items-center">
                            <h1 className="text-2xl font-bold text-gray-800">Journal</h1>
                            {!isConnected && (
                                <div className="text-red-500 text-sm font-medium flex items-center gap-2 bg-red-50 px-3 py-1 rounded border border-red-200">
                                    <span>⚠️ Connection Failed</span>
                                    <button onClick={() => setShowConfig(true)} className="underline text-red-700">Configure IP</button>
                                </div>
                            )}
                        </header>
                        
                        <div className="bg-white p-6 rounded-xl shadow-sm border border-gray-100 mb-8">
                            <h2 className="text-lg font-bold mb-4 text-gray-700">New Entry</h2>
                            <form onSubmit={handleSubmit} className="space-y-4">
                                <input 
                                    className="w-full border border-gray-300 p-2 rounded-lg focus:ring-2 focus:ring-green-500 focus:outline-none" 
                                    placeholder="Title" 
                                    value={newPost.title} 
                                    onChange={e => setNewPost({...newPost, title: e.target.value})} 
                                />
                                <textarea 
                                    className="w-full border border-gray-300 p-2 rounded-lg focus:ring-2 focus:ring-green-500 focus:outline-none" 
                                    placeholder="Content" 
                                    rows="3" 
                                    value={newPost.content} 
                                    onChange={e => setNewPost({...newPost, content: e.target.value})} 
                                />
                                <button 
                                    disabled={!isConnected} 
                                    className="bg-green-600 text-white px-6 py-2 rounded-lg font-medium hover:bg-green-700 disabled:opacity-50 disabled:cursor-not-allowed transition-colors"
                                >
                                    Publish to Oracle
                                </button>
                            </form>
                        </div>

                        <div className="space-y-4">
                            {posts.length === 0 && isConnected && (
                                <div className="text-center text-gray-400 py-10">No entries yet. Start writing!</div>
                            )}
                            {posts.map(post => (
                                <div key={post.id} className="bg-white p-6 rounded-xl shadow-sm border border-gray-100 flex justify-between group">
                                    <div>
                                        <h3 className="font-bold text-lg text-gray-800">{post.title}</h3>
                                        <p className="text-gray-600 mt-1">{post.content}</p>
                                        <span className="text-xs text-gray-400 mt-2 block">{new Date(post.date).toLocaleDateString()}</span>
                                    </div>
                                    <button 
                                        onClick={() => handleDelete(post.id)} 
                                        className="text-gray-300 hover:text-red-500 transition-colors opacity-0 group-hover:opacity-100 p-2"
                                    >
                                        <IconTrash />
                                    </button>
                                </div>
                            ))}
                        </div>
                    </main>
                </div>
            );
        };
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
