    <style>
        :root {
            --bg-color: #F4F7F6;
            --card-bg: #FFFFFF;
            --text-primary: #2C3E50;
            --text-secondary: #7F8C8D;
            --accent-primary: #588157; 
            --accent-light: #A3B18A;
            --radius: 16px;
            --shadow: 0 4px 20px rgba(0,0,0,0.04);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* --- Navigation --- */
        .nav-bar {
            width: 100%;
            background: var(--card-bg);
            padding: 15px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: var(--shadow);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .brand {
            font-family: 'JetBrains Mono', monospace;
            font-weight: 700;
            font-size: 1.2rem;
            color: var(--accent-primary);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .brand img { height: 32px; width: auto; border-radius: 4px; }

        .tabs { display: flex; gap: 10px; }

        .tab-btn {
            background: none; border: none; font-family: 'Inter', sans-serif;
            font-size: 0.9rem; color: var(--text-secondary); cursor: pointer;
            padding: 8px 16px; border-radius: 20px; transition: 0.3s; font-weight: 500;
        }
        .tab-btn:hover { color: var(--accent-primary); background: #F1F8F1; }
        .tab-btn.active { background: var(--accent-primary); color: white; box-shadow: 0 4px 10px rgba(88, 129, 87, 0.2); }

        /* --- Layout --- */
        .main-container { width: 100%; max-width: 900px; padding: 40px 20px; }
        .section { display: none; animation: fadeIn 0.4s ease; }
        .section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* --- EDITOR --- */
        .editor-card {
            background: var(--card-bg); border-radius: var(--radius); padding: 30px;
            box-shadow: var(--shadow); margin-bottom: 40px; border: 1px solid rgba(0,0,0,0.05);
        }
        .editor-title { width: 100%; border: none; outline: none; font-size: 1.5rem; font-weight: 700; margin-bottom: 15px; }
        .editor-body { width: 100%; border: none; outline: none; font-size: 1rem; color: #4A5568; min-height: 120px; resize: vertical; line-height: 1.6; }
        .editor-tools { display: flex; justify-content: space-between; align-items: center; margin-top: 20px; padding-top: 20px; border-top: 1px solid #f0f0f0; }
        
        .ai-btn { background: linear-gradient(135deg, #e0f7fa 0%, #e8f5e9 100%); color: #2d6a4f; border: 1px solid #b7e4c7; padding: 8px 16px; border-radius: 20px; cursor: pointer; font-size: 0.85rem; font-weight: 600; }
        .post-btn { background: var(--accent-primary); color: white; border: none; padding: 10px 24px; border-radius: 20px; font-weight: 600; cursor: pointer; }

        /* --- FEED & SHARE BUTTONS --- */
        .post-card {
            background: var(--card-bg); padding: 25px; border-radius: var(--radius);
            margin-bottom: 25px; box-shadow: var(--shadow); position: relative;
            border-left: 4px solid var(--accent-primary);
        }
        .post-date { font-family: 'JetBrains Mono', monospace; font-size: 0.75rem; color: #999; margin-bottom: 8px; display: block; }
        .post-title { font-size: 1.25rem; font-weight: 700; margin-bottom: 10px; }
        .post-content { line-height: 1.6; color: #444; white-space: pre-line; margin-bottom: 20px; }

        /* New Social Share Styling */
        .share-row {
            display: flex; gap: 10px; padding-top: 15px; border-top: 1px solid #f0f0f0;
        }
        .share-btn {
            text-decoration: none; padding: 6px 12px; border-radius: 6px; font-size: 0.8rem; font-weight: 600; display: flex; align-items: center; gap: 6px; transition: 0.2s;
        }
        .share-x { background: #000; color: white; }
        .share-threads { background: #1a1a1a; color: white; }
        .share-fb { background: #1877F2; color: white; }
        .share-btn:hover { opacity: 0.8; transform: translateY(-2px); }

        /* --- DASHBOARD --- */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
        .dash-card { background: var(--card-bg); border-radius: var(--radius); padding: 25px; box-shadow: var(--shadow); }
        .metric-big { font-size: 2.5rem; font-weight: 300; color: var(--text-primary); margin: 10px 0; }
        .metric-label { font-size: 0.75rem; color: #999; text-transform: uppercase; letter-spacing: 1px; font-weight: 600; }
        .chart-container { grid-column: 1 / -1; background: white; padding: 20px; border-radius: var(--radius); box-shadow: var(--shadow); height: 300px; }

        @media (max-width: 600px) {
            .nav-bar { flex-direction: column; gap: 15px; padding: 15px; }
            .grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <nav class="nav-bar">
        <div class="brand">
            <img src="logo.png" alt="Logo" onerror="this.style.display='none'">
            KEBUNDATA PRO
        </div>
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('journal')">Journal</button>
            <button class="tab-btn" onclick="switchTab('monitor')">Monitor</button>
        </div>
    </nav>

    <div class="main-container">

        <!-- JOURNAL TAB -->
        <div id="journal" class="section active">
            <div class="editor-card">
                <input type="text" id="new-title" class="editor-title" placeholder="Title (e.g., Harvest Day)">
                <textarea id="new-content" class="editor-body" placeholder="Write your daily log here..."></textarea>
                <div class="editor-tools">
                    <button class="ai-btn" onclick="aiAutoDraft()"><span>✨ AI Auto-Draft</span></button>
                    <div style="display: flex; gap: 10px;">
                        <input type="text" id="new-tags" style="border:none; background:#f9f9f9; padding:8px 15px; border-radius:15px; outline:none; font-size:0.85rem;" placeholder="Tags">
                        <button id="btn-post" class="post-btn">POST UPDATE</button>
                    </div>
                </div>
            </div>
            <div id="blog-feed">
                <div style="text-align: center; color: #ccc; margin-top: 40px;">Loading Database...</div>
            </div>
        </div>

        <!-- MONITOR TAB -->
        <div id="monitor" class="section">
            <div class="grid">
                <div class="dash-card">
                    <div class="metric-label">Nutrient pH</div>
                    <div class="metric-big" id="ph-val">6.0</div>
                    <div style="height:4px; background:#eee; width:100%; border-radius:2px;"><div style="width:60%; background:var(--accent-primary); height:100%; border-radius:2px;"></div></div>
                </div>
                <div class="dash-card">
                    <div class="metric-label">Water Temp</div>
                    <div class="metric-big" id="temp-val">24.5°C</div>
                    <div style="font-size:0.8rem; color:var(--accent-light);">Optimal Range</div>
                </div>
                <div class="dash-card">
                    <div class="metric-label">Vapor Pressure (VPD)</div>
                    <div class="metric-big" id="vpd-val">0.95</div>
                    <div style="font-size:0.8rem; color:var(--accent-primary);">● Healthy</div>
                </div>
                <div class="chart-container">
                    <canvas id="tempChart"></canvas>
                </div>
            </div>
        </div>
    </div>

    <!-- FIREBASE & LOGIC -->
    <script type="module">
        // --- CONFIGURATION ---
        const firebaseConfig = {
            apiKey: "AIzaSyBTvbb8trwrmCe9Gt5u3iAAqf7sR-MqBKE",
            authDomain: "kebundata-964d4.firebaseapp.com",
            projectId: "kebundata-964d4",
            storageBucket: "kebundata-964d4.firebasestorage.app",
            messagingSenderId: "412272585692",
            appId: "1:412272585692:web:2d6ffbf018dfea84cf3d19",
            measurementId: "G-RZ81MG2EP2"
        };

        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, getDocs, query, orderBy, Timestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        let db, user;

        try {
            const app = initializeApp(firebaseConfig);
            db = getFirestore(app);
            const auth = getAuth(app);
            signInAnonymously(auth).catch(e => console.error("Auth Error:", e));
            onAuthStateChanged(auth, (u) => { if(u) { user = u; loadPosts(); } });
        } catch (e) { console.error("Init Error:", e); }

        // --- CORE FUNCTIONS ---

        const postBtn = document.getElementById('btn-post');
        if(postBtn) {
            postBtn.addEventListener('click', async () => {
                if(!db) return alert("Database connecting...");
                const title = document.getElementById('new-title').value;
                const content = document.getElementById('new-content').value;
                const tags = document.getElementById('new-tags').value;

                if(!title || !content) return alert("Please write something.");
                
                postBtn.innerText = "Saving...";
                try {
                    await addDoc(collection(db, "posts"), {
                        title, content, tags: tags.split(','), date: Timestamp.now(), author: user.uid
                    });
                    document.getElementById('new-title').value = "";
                    document.getElementById('new-content').value = "";
                    loadPosts();
                } catch(e) { alert("Save Error: " + e.message); }
                postBtn.innerText = "POST UPDATE";
            });
        }

        async function loadPosts() {
            const feed = document.getElementById('blog-feed');
            try {
                const q = query(collection(db, "posts"), orderBy("date", "desc"));
                const snap = await getDocs(q);
                feed.innerHTML = "";
                
                if(snap.empty) { feed.innerHTML = "<center style='color:#999; margin-top:20px;'>No posts yet.</center>"; return; }
                
                snap.forEach(doc => {
                    const data = doc.data();
                    const dateStr = data.date ? data.date.toDate().toLocaleString() : "Just now";
                    
                    // --- SOCIAL SHARE LOGIC ---
                    const shareText = encodeURIComponent(`🌱 ${data.title}\n\n${data.content.substring(0, 100)}...\n\nRead more at KebunData:`);
                    const shareUrl = encodeURIComponent(window.location.href);
                    
                    const xUrl = `https://twitter.com/intent/tweet?text=${shareText}&url=${shareUrl}`;
                    const threadsUrl = `https://www.threads.net/intent/post?text=${shareText} ${shareUrl}`;
                    const fbUrl = `https://www.facebook.com/sharer/sharer.php?u=${shareUrl}`;

                    const div = document.createElement('div');
                    div.className = 'post-card';
                    div.innerHTML = `
                        <span class="post-date">${dateStr}</span>
                        <div class="post-title">${data.title}</div>
                        <div class="post-content">${data.content}</div>
                        <div class="share-row">
                            <a href="${xUrl}" target="_blank" class="share-btn share-x">𝕏 Post</a>
                            <a href="${threadsUrl}" target="_blank" class="share-btn share-threads">@ Threads</a>
                            <a href="${fbUrl}" target="_blank" class="share-btn share-fb">f Share</a>
                        </div>
                    `;
                    feed.appendChild(div);
                });
            } catch (e) { console.error(e); }
        }

        // --- DASHBOARD SIMULATION ---
        window.aiAutoDraft = function() {
            const ph = document.getElementById('ph-val').innerText;
            const temp = document.getElementById('temp-val').innerText;
            document.getElementById('new-title').value = "Daily Status Report";
            document.getElementById('new-content').value = `System Status Report:\n- pH: ${ph}\n- Temp: ${temp}\n\nSystem running optimally. No issues detected in the ZipGrow towers.`;
        }

        window.switchTab = function(t) {
            document.querySelectorAll('.section').forEach(e => e.classList.remove('active'));
            document.getElementById(t).classList.add('active');
            document.querySelectorAll('.tab-btn').forEach(e => e.classList.remove('active'));
            event.target.classList.add('active');
            if(t === 'monitor' && window.myChart) window.myChart.resize();
        }

        const ctx = document.getElementById('tempChart');
        if(ctx) {
            window.myChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: ['12:00', '12:05', '12:10', '12:15', '12:20'],
                    datasets: [{
                        label: 'Water Temp',
                        data: [24.1, 24.3, 24.2, 24.5, 24.4],
                        borderColor: '#588157', tension: 0.4, fill: true, backgroundColor: 'rgba(88, 129, 87, 0.1)'
                    }]
                },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { min: 20, max: 30 } } }
            });
        }

        setInterval(() => {
            const ph = (6.0 + (Math.random() * 0.2 - 0.1)).toFixed(1);
            const temp = (24.5 + (Math.random() * 0.4 - 0.2)).toFixed(1);
            document.getElementById('ph-val').innerText = ph;
            document.getElementById('temp-val').innerText = temp + "°C";
            if(window.myChart) {
                const newTime = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
                window.myChart.data.labels.push(newTime);
                window.myChart.data.datasets[0].data.push(parseFloat(temp));
                if(window.myChart.data.labels.length > 10) { window.myChart.data.labels.shift(); window.myChart.data.datasets[0].data.shift(); }
                window.myChart.update();
            }
        }, 3000);
    </script>
</body>

            onAuthStateChanged(auth, (u) => { if(u) { user = u; loadPosts(); } });
        } catch (e) { console.error("Init Error:", e); }

        // --- CORE FUNCTIONS ---

        const postBtn = document.getElementById('btn-post');
        if(postBtn) {
            postBtn.addEventListener('click', async () => {
                if(!db) return alert("Database connecting...");
                const title = document.getElementById('new-title').value;
                const content = document.getElementById('new-content').value;
                const tags = document.getElementById('new-tags').value;

                if(!title || !content) return alert("Please write something.");
                
                postBtn.innerText = "Saving...";
                try {
                    await addDoc(collection(db, "posts"), {
                        title, content, tags: tags.split(','), date: Timestamp.now(), author: user.uid
                    });
                    document.getElementById('new-title').value = "";
                    document.getElementById('new-content').value = "";
                    loadPosts();
                } catch(e) { alert("Save Error: " + e.message); }
                postBtn.innerText = "POST UPDATE";
            });
        }

        async function loadPosts() {
            const feed = document.getElementById('blog-feed');
            try {
                const q = query(collection(db, "posts"), orderBy("date", "desc"));
                const snap = await getDocs(q);
                feed.innerHTML = "";
                
                if(snap.empty) { feed.innerHTML = "<center style='color:#999; margin-top:20px;'>No posts yet.</center>"; return; }
                
                snap.forEach(doc => {
                    const data = doc.data();
                    const dateStr = data.date ? data.date.toDate().toLocaleString() : "Just now";
                    
                    // --- SOCIAL SHARE LOGIC ---
                    const shareText = encodeURIComponent(`🌱 ${data.title}\n\n${data.content.substring(0, 100)}...\n\nRead more at KebunData:`);
                    const shareUrl = encodeURIComponent(window.location.href);
                    
                    const xUrl = `https://twitter.com/intent/tweet?text=${shareText}&url=${shareUrl}`;
                    const threadsUrl = `https://www.threads.net/intent/post?text=${shareText} ${shareUrl}`;
                    const fbUrl = `https://www.facebook.com/sharer/sharer.php?u=${shareUrl}`;

                    const div = document.createElement('div');
                    div.className = 'post-card';
                    div.innerHTML = `
                        <span class="post-date">${dateStr}</span>
                        <div class="post-title">${data.title}</div>
                        <div class="post-content">${data.content}</div>
                        <div class="share-row">
                            <a href="${xUrl}" target="_blank" class="share-btn share-x">𝕏 Post</a>
                            <a href="${threadsUrl}" target="_blank" class="share-btn share-threads">@ Threads</a>
                            <a href="${fbUrl}" target="_blank" class="share-btn share-fb">f Share</a>
                        </div>
                    `;
                    feed.appendChild(div);
                });
            } catch (e) { console.error(e); }
        }

        // --- DASHBOARD SIMULATION ---
        window.aiAutoDraft = function() {
            const ph = document.getElementById('ph-val').innerText;
            const temp = document.getElementById('temp-val').innerText;
            document.getElementById('new-title').value = "Daily Status Report";
            document.getElementById('new-content').value = `System Status Report:\n- pH: ${ph}\n- Temp: ${temp}\n\nSystem running optimally. No issues detected in the ZipGrow towers.`;
        }

        window.switchTab = function(t) {
            document.querySelectorAll('.section').forEach(e => e.classList.remove('active'));
            document.getElementById(t).classList.add('active');
            document.querySelectorAll('.tab-btn').forEach(e => e.classList.remove('active'));
            event.target.classList.add('active');
            if(t === 'monitor' && window.myChart) window.myChart.resize();
        }

        const ctx = document.getElementById('tempChart');
        if(ctx) {
            window.myChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: ['12:00', '12:05', '12:10', '12:15', '12:20'],
                    datasets: [{
                        label: 'Water Temp',
                        data: [24.1, 24.3, 24.2, 24.5, 24.4],
                        borderColor: '#588157', tension: 0.4, fill: true, backgroundColor: 'rgba(88, 129, 87, 0.1)'
                    }]
                },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { min: 20, max: 30 } } }
            });
        }

        setInterval(() => {
            const ph = (6.0 + (Math.random() * 0.2 - 0.1)).toFixed(1);
            const temp = (24.5 + (Math.random() * 0.4 - 0.2)).toFixed(1);
            document.getElementById('ph-val').innerText = ph;
            document.getElementById('temp-val').innerText = temp + "°C";
            if(window.myChart) {
                const newTime = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
                window.myChart.data.labels.push(newTime);
                window.myChart.data.datasets[0].data.push(parseFloat(temp));
                if(window.myChart.data.labels.length > 10) { window.myChart.data.labels.shift(); window.myChart.data.datasets[0].data.shift(); }
                window.myChart.update();
            }
        }, 3000);
    </script>
</body>
</html>
