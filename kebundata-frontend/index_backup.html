<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KebunData | Golden Harvest</title>
    
    <!-- 1. React Libraries -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- 2. Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- 3. Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Merriweather:ital,wght@0,300;0,400;0,700;1,400&display=swap" rel="stylesheet">

    <!-- 4. Design System Config -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#2B3F34',
                        secondary: '#5D8A66',
                        accent: '#D4A056',
                        canvas: '#F4F6F5',
                        surface: '#FFFFFF',
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        serif: ['Merriweather', 'serif'],
                    },
                    boxShadow: {
                        'soft-green': '0 20px 40px -10px rgba(43, 63, 52, 0.08)',
                        'floating': '0 13px 21px -5px rgba(43, 63, 52, 0.05)'
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #F4F6F5; }
        .fade-in { animation: fadeIn 0.6s cubic-bezier(0.16, 1, 0.3, 1); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #E0E2E1; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #D4A056; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- SMART CONFIG ---
        const API_URL = `http://${window.location.hostname}:3000/api/posts`;

        // --- ICONS ---
        const Icons = {
            Leaf: () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5"><path d="M12 22c4.97 0 9-4.03 9-9c0-4.97-9-13-9-13S3 8.03 3 13c0 4.97 4.03 9 9 9z"/><path d="M12 13a5 5 0 0 0 5 5"/><path d="M12 22V9"/></svg>,
            Grid: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>,
            Book: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>,
            Send: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>,
            Trash: () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5"><path d="M3 6h18"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>,
            Share: () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>,
            Wifi: ({on}) => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke={on ? "#5D8A66" : "#EF4444"} strokeWidth="2"><path d="M5 12.55a11 11 0 0 1 14.08 0"/><path d="M1.42 9a16 16 0 0 1 21.16 0"/><path d="M8.53 16.11a6 6 0 0 1 6.95 0"/><line x1="12" y1="20" x2="12.01" y2="20"/></svg>
        };

        // --- DATA SERVICE ---
        const DataService = {
            fetch: async () => { try { return await(await fetch(API_URL)).json(); } catch(e){ return null; } },
            add: async (p) => await fetch(API_URL, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(p) }),
            del: async (id) => await fetch(`${API_URL}/${id}`, { method:'DELETE' })
        };

        // --- COMPONENTS ---

        const NavItem = ({ active, icon: Icon, label, onClick }) => (
            <button 
                onClick={onClick}
                className={`w-full flex items-center gap-4 px-6 py-4 transition-all duration-300 group ${active ? 'bg-surface shadow-floating translate-x-2 rounded-xl' : 'hover:bg-primary/50'}`}
            >
                <span className={`${active ? 'text-primary' : 'text-white/60 group-hover:text-white'}`}><Icon /></span>
                <span className={`font-medium tracking-wide ${active ? 'text-primary' : 'text-white/80 group-hover:text-white'}`}>{label}</span>
            </button>
        );

        const StatCard = ({ label, value, unit, trend, trendGood }) => (
            <div className="bg-surface p-8 rounded-xl shadow-soft-green hover:shadow-lg transition-all duration-300 border border-white/50">
                <h3 className="text-secondary text-sm font-semibold uppercase tracking-wider mb-3">{label}</h3>
                <div className="flex items-baseline gap-2">
                    <span className="text-[42px] font-serif font-light text-primary leading-none">{value}</span>
                    <span className="text-gray-400 font-medium">{unit}</span>
                </div>
                {trend && (
                    <div className={`mt-4 text-sm font-medium flex items-center gap-1 ${trendGood ? 'text-secondary' : 'text-orange-400'}`}>
                        {trendGood ? '↑' : '↓'} {trend}
                    </div>
                )}
            </div>
        );

        const JournalEntry = ({ post, onDelete, onShare }) => (
            <div className="relative pl-8 md:pl-12 py-2 group fade-in">
                <div className="absolute left-[11px] top-0 bottom-0 w-[2px] bg-secondary/20 group-hover:bg-accent/50 transition-colors"></div>
                <div className="absolute left-0 top-8 w-6 h-6 rounded-full border-4 border-canvas bg-white shadow-sm z-10 group-hover:border-accent transition-colors"></div>

                <div className="bg-surface rounded-xl shadow-floating p-6 md:p-8 hover:-translate-y-1 transition-transform duration-300">
                    <div className="flex justify-between items-start mb-4">
                        <div>
                            <span className="text-accent text-xs font-bold uppercase tracking-widest">{new Date(post.date).toLocaleDateString(undefined, {month:'long', day:'numeric'})}</span>
                            <h3 className="text-2xl font-serif text-primary mt-1">{post.title}</h3>
                        </div>
                        <div className="flex gap-2 opacity-0 group-hover:opacity-100 transition-opacity">
                            <button onClick={() => onShare(post)} className="p-2 hover:bg-canvas rounded-full text-gray-400 hover:text-primary"><Icons.Share /></button>
                            <button onClick={() => onDelete(post.id)} className="p-2 hover:bg-red-50 rounded-full text-gray-400 hover:text-red-500"><Icons.Trash /></button>
                        </div>
                    </div>
                    <p className="text-gray-600 leading-relaxed font-serif text-lg">{post.content}</p>
                    {(post.image || post.video) && (
                        <div className="mt-6 rounded-lg overflow-hidden shadow-inner bg-canvas">
                            {post.image && <img src={post.image} className="w-full h-auto object-cover max-h-[500px]" onError={(e) => e.target.style.display='none'} />}
                            {post.video && (
                                <div className="p-4 flex items-center gap-3">
                                    <div className="w-10 h-10 bg-primary/10 rounded-full flex items-center justify-center text-primary">▶</div>
                                    <a href={post.video} target="_blank" className="text-primary hover:text-accent underline decoration-1 underline-offset-4">{post.video}</a>
                                </div>
                            )}
                        </div>
                    )}
                </div>
            </div>
        );

        // --- UPDATED SHARE MODAL ---
        const ShareModal = ({ post, onClose }) => {
            const shareText = encodeURIComponent(`${post.title}\n\n${post.content}`);
            const shareUrl = encodeURIComponent(window.location.href);

            const platforms = [
                { name: 'WhatsApp', color: 'bg-green-500', url: `https://wa.me/?text=${shareText}` },
                { name: 'Facebook', color: 'bg-blue-600', url: `https://www.facebook.com/sharer/sharer.php?u=${shareUrl}&quote=${shareText}` },
                { name: 'X / Twitter', color: 'bg-black', url: `https://twitter.com/intent/tweet?text=${shareText}&url=${shareUrl}` },
                // ADDED THREADS SUPPORT
                { name: 'Threads', color: 'bg-neutral-800', url: `https://www.threads.net/intent/post?text=${shareText}` }
            ];

            return (
                <div className="fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4 backdrop-blur-sm">
                    <div className="bg-white rounded-xl shadow-xl w-full max-w-sm overflow-hidden animate-fade-in">
                        <div className="p-4 border-b flex justify-between items-center bg-gray-50">
                            <h3 className="font-bold text-gray-700">Share Post</h3>
                            <button onClick={onClose} className="text-gray-400 hover:text-gray-600"><Icons.Menu /></button>
                        </div>
                        <div className="p-6 space-y-3">
                            <p className="text-sm text-gray-500 mb-4">Choose a platform to broadcast your update:</p>
                            {platforms.map(p => (
                                <a 
                                    key={p.name} 
                                    href={p.url} 
                                    target="_blank" 
                                    rel="noopener noreferrer"
                                    className={`block w-full text-center py-3 rounded-lg text-white font-medium hover:opacity-90 transition-opacity ${p.color}`}
                                    onClick={onClose}
                                >
                                    Share on {p.name}
                                </a>
                            ))}
                        </div>
                    </div>
                </div>
            );
        };

        const App = () => {
            const [view, setView] = useState('journal');
            const [posts, setPosts] = useState([]);
            const [online, setOnline] = useState(false);
            const [newPost, setNewPost] = useState({ title: '', content: '', image: '', video: '' });
            const [sharePost, setSharePost] = useState(null); 

            const load = async () => {
                const data = await DataService.fetch();
                if (data) {
                    setPosts(data.map(p => ({ id: p.ID, title: p.TITLE, content: p.CONTENT, image: p.IMAGE_URL, video: p.VIDEO_URL, date: p.CREATED_AT })));
                    setOnline(true);
                } else setOnline(false);
            };

            useEffect(() => { load(); const i = setInterval(load, 5000); return () => clearInterval(i); }, []);

            const handleSubmit = async (e) => {
                e.preventDefault();
                await DataService.add(newPost);
                setNewPost({ title: '', content: '', image: '', video: '' });
                load();
            };

            return (
                <div className="min-h-screen flex flex-col md:flex-row font-sans text-primary">
                    <aside className="w-full md:w-[280px] bg-primary text-white flex flex-col justify-between sticky top-0 h-auto md:h-screen z-20 shadow-2xl">
                        <div className="p-8">
                            <div className="flex items-center gap-4 mb-12">
                                <img 
                                    src="KebunData_logo-LG.png" 
                                    alt="Logo" 
                                    className="w-12 h-12 rounded-xl object-cover bg-white/10 shadow-sm"
                                    onError={(e) => { e.target.style.display='none'; e.target.nextSibling.style.display='flex'; }} 
                                />
                                <div className="w-12 h-12 bg-secondary rounded-xl items-center justify-center text-white hidden"><Icons.Leaf /></div>
                                <h1 className="text-2xl font-serif font-bold tracking-tight">KebunData</h1>
                            </div>
                            <nav className="space-y-4">
                                <NavItem active={view === 'monitor'} icon={Icons.Grid} label="Monitoring" onClick={() => setView('monitor')} />
                                <NavItem active={view === 'journal'} icon={Icons.Book} label="Farm Journal" onClick={() => setView('journal')} />
                            </nav>
                        </div>
                        <div className="p-8 border-t border-white/10">
                            <div className="flex items-center gap-3 text-sm text-white/50">
                                <Icons.Wifi on={online} />
                                <span>System {online ? 'Online' : 'Offline'}</span>
                            </div>
                        </div>
                    </aside>

                    <main className="flex-1 p-6 md:p-12 overflow-y-auto h-screen bg-canvas">
                        <header className="mb-12 max-w-4xl mx-auto">
                            <h2 className="text-[42px] font-serif text-primary mb-2 fade-in">
                                {view === 'monitor' ? 'Field Overview' : 'Daily Chronicles'}
                            </h2>
                            <p className="text-secondary text-lg fade-in">
                                {view === 'monitor' ? 'Live metrics from Sector 7' : 'Capture the journey of your harvest.'}
                            </p>
                        </header>

                        <div className="max-w-4xl mx-auto">
                            {view === 'monitor' ? (
                                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 fade-in">
                                    <StatCard label="Total Harvest" value="1,240" unit="kg" trend="12%" trendGood={true} />
                                    <StatCard label="Moisture" value="68" unit="%" trend="Optimal" trendGood={true} />
                                    <StatCard label="Active Nodes" value="24" unit="/ 25" />
                                </div>
                            ) : (
                                <div className="space-y-12">
                                    <div className="bg-surface p-8 rounded-xl shadow-soft-green border border-white/50 fade-in">
                                        <div className="flex items-center justify-between mb-6">
                                            <h3 className="text-lg font-bold text-primary">New Entry</h3>
                                            <span className="text-xs text-accent uppercase font-bold tracking-widest">Today</span>
                                        </div>
                                        <form onSubmit={handleSubmit} className="space-y-6">
                                            <div><input className="w-full text-2xl font-serif placeholder:text-gray-300 border-b border-gray-200 py-2 focus:border-accent focus:outline-none bg-transparent transition-colors" placeholder="Title of your story..." value={newPost.title} onChange={e => setNewPost({...newPost, title: e.target.value})} /></div>
                                            <div><textarea className="w-full text-lg leading-relaxed placeholder:text-gray-300 border-b border-gray-200 py-2 focus:border-accent focus:outline-none bg-transparent resize-none transition-colors" placeholder="Describe the soil, the weather, the growth..." rows="3" value={newPost.content} onChange={e => setNewPost({...newPost, content: e.target.value})} /></div>
                                            <div className="grid grid-cols-2 gap-6">
                                                <input className="text-sm bg-canvas p-3 rounded-lg outline-none text-gray-600 focus:ring-1 focus:ring-accent" placeholder="Image URL..." value={newPost.image} onChange={e => setNewPost({...newPost, image: e.target.value})} />
                                                <input className="text-sm bg-canvas p-3 rounded-lg outline-none text-gray-600 focus:ring-1 focus:ring-accent" placeholder="Video URL..." value={newPost.video} onChange={e => setNewPost({...newPost, video: e.target.value})} />
                                            </div>
                                            <div className="flex justify-end pt-2">
                                                <button disabled={!online} className="bg-accent text-white px-8 py-3 rounded-xl font-bold shadow-lg hover:shadow-xl hover:-translate-y-1 transition-all disabled:opacity-50 disabled:shadow-none flex items-center gap-2"><span>Publish</span> <Icons.Send /></button>
                                            </div>
                                        </form>
                                    </div>
                                    <div className="space-y-0">
                                        {posts.map(post => (
                                            <JournalEntry key={post.id} post={post} onDelete={() => {if(confirm('Archive this memory?')) { DataService.del(post.id); load(); }}} onShare={() => setSharePost(post)} />
                                        ))}
                                    </div>
                                </div>
                            )}
                        </div>
                    </main>

                    {sharePost && <ShareModal post={sharePost} onClose={() => setSharePost(null)} />}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
