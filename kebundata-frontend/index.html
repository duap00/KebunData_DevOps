<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KebunData | Golden Harvest</title>
    <link rel="icon" type="image/png" href="KebunData_logo-LG (2).png">
    
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { primary: '#2B3F34', secondary: '#5D8A66', accent: '#D4A056', canvas: '#F4F6F5', surface: '#FFFFFF' },
                    fontFamily: { sans: ['Inter', 'sans-serif'], serif: ['Merriweather', 'serif'] },
                    boxShadow: { 'soft-green': '0 20px 40px -10px rgba(43, 63, 52, 0.08)', 'floating': '0 13px 21px -5px rgba(43, 63, 52, 0.05)' }
                }
            }
        }
    </script>
    <style>
        body { background-color: #F4F6F5; }
        .fade-in { animation: fadeIn 0.6s cubic-bezier(0.16, 1, 0.3, 1); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #E0E2E1; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #D4A056; }
        /* Calendar specific styles */
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body>
    <div id="root"></div>
    <div id="error-display" style="display:none; padding: 20px; background: #fee; border: 1px solid red; color: red; position: fixed; top: 0; left: 0; width: 100%; z-index: 9999;"></div>
    <script>
        window.onerror = function(message, source, lineno, colno, error) {
            document.getElementById('error-display').style.display = 'block';
            document.getElementById('error-display').innerHTML = `<strong>⚠️ System Error:</strong><br>${message}<br><small>${source}:${lineno}</small>`;
        };
    </script>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;
        const BASE_API = `http://${window.location.hostname}:3000/api`;
        
        // --- API KEY SECTION ---
        const apiKey = ""; // Paste your AIza... key here

        const CROP_SCHEDULE = {
            'Kale': { 'Sowing': 3, 'Germination': 7, 'Seedling': 21, 'Vegetative': 55, 'Harvest': 70 },
            'Spinach': { 'Sowing': 5, 'Germination': 10, 'Seedling': 20, 'Vegetative': 35, 'Harvest': 45 },
            'Lettuce': { 'Sowing': 2, 'Germination': 7, 'Seedling': 20, 'Vegetative': 40, 'Harvest': 55 },
            'Chili': { 'Sowing': 7, 'Germination': 14, 'Seedling': 35, 'Vegetative': 75, 'Harvest': 100 }
        };

        const Icons = {
            Leaf: () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5"><path d="M12 22c4.97 0 9-4.03 9-9c0-4.97-9-13-9-13S3 8.03 3 13c0 4.97 4.03 9 9 9z"/><path d="M12 13a5 5 0 0 0 5 5"/><path d="M12 22V9"/></svg>,
            Grid: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>,
            Book: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>,
            Send: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>,
            Trash: () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5"><path d="M3 6h18"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>,
            Share: () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>,
            Wifi: ({on}) => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke={on ? "#5D8A66" : "#EF4444"} strokeWidth="2"><path d="M5 12.55a11 11 0 0 1 14.08 0"/><path d="M1.42 9a16 16 0 0 1 21.16 0"/><path d="M8.53 16.11a6 6 0 0 1 6.95 0"/><line x1="12" y1="20" x2="12.01" y2="20"/></svg>,
            Calendar: () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>,
            Sun: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2"/><path d="M12 21v2"/><path d="M4.22 4.22l1.42 1.42"/><path d="M18.36 18.36l1.42 1.42"/><path d="M1 12h2"/><path d="M21 12h2"/><path d="M4.22 19.78l1.42-1.42"/><path d="M18.36 5.64l1.42-1.42"/></svg>
        };

        const DataService = {
            fetchPosts: async () => { try { return await(await fetch(`${BASE_API}/posts`)).json(); } catch(e){ return null; } },
            fetchDashboard: async () => { try { return await(await fetch(`${BASE_API}/dashboard`)).json(); } catch(e){ return null; } },
            add: async (p) => await fetch(`${BASE_API}/posts`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(p) }),
            del: async (id) => await fetch(`${BASE_API}/posts/${id}`, { method:'DELETE' })
        };

        const AIService = {
            askAgronomist: async (crop, stage, notes) => {
                try {
                    const response = await fetch(`${BASE_API}/ask-ai`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ prompt: `Act as expert agricultural consultant for ${crop} at ${stage} stage. Notes: ${notes}. Give 3 actionable tips.` })
                    });
                    const data = await response.json();
                    return data.candidates?.[0]?.content?.parts?.[0]?.text || "AI unavailable.";
                } catch (error) { return "Connection Error."; }
            }
        };

        // --- NEW: FARM ACTIVITY CALENDAR ---
        const FarmCalendar = ({ posts }) => {
            const [currentDate, setCurrentDate] = useState(new Date());

            const daysInMonth = new Date(currentDate.getFullYear(), currentDate.getMonth() + 1, 0).getDate();
            const firstDay = new Date(currentDate.getFullYear(), currentDate.getMonth(), 1).getDay();

            const monthNames = ["January", "February", "March", "April", "May", "June",
                "July", "August", "September", "October", "November", "December"
            ];

            const changeMonth = (offset) => {
                setCurrentDate(new Date(currentDate.getFullYear(), currentDate.getMonth() + offset, 1));
            };

            const getEventsForDay = (day) => {
                return posts.filter(p => {
                    const pDate = new Date(p.date);
                    return pDate.getDate() === day &&
                           pDate.getMonth() === currentDate.getMonth() &&
                           pDate.getFullYear() === currentDate.getFullYear();
                });
            };

            const renderCalendarDays = () => {
                const days = [];
                // Empty slots for prev month
                for (let i = 0; i < firstDay; i++) {
                    days.push(<div key={`empty-${i}`} className="h-20 bg-gray-50 border border-gray-100"></div>);
                }
                // Actual days
                for (let d = 1; d <= daysInMonth; d++) {
                    const events = getEventsForDay(d);
                    const isToday = new Date().toDateString() === new Date(currentDate.getFullYear(), currentDate.getMonth(), d).toDateString();
                    
                    days.push(
                        <div key={d} className={`h-20 border border-gray-100 p-1 relative overflow-hidden group hover:bg-white transition-colors ${isToday ? 'bg-green-50' : 'bg-surface'}`}>
                            <span className={`text-xs font-bold ${isToday ? 'text-green-600' : 'text-gray-400'} block mb-1`}>{d}</span>
                            <div className="space-y-1 overflow-y-auto max-h-[calc(100%-1.2rem)] scrollbar-hide">
                                {events.map(ev => (
                                    <div key={ev.id} className="text-[9px] bg-primary/10 text-primary px-1 py-0.5 rounded truncate cursor-help" title={`${ev.title}\nLocation: ${ev.location || 'Unknown'}`}>
                                        {ev.crop_name || 'Log'} 
                                    </div>
                                ))}
                            </div>
                        </div>
                    );
                }
                return days;
            };

            return (
                <div className="bg-surface p-6 rounded-xl shadow-soft-green border border-white/50 h-80 flex flex-col">
                    <div className="flex justify-between items-center mb-4">
                        <h3 className="text-secondary text-sm font-semibold uppercase">Activity Calendar</h3>
                        <div className="flex items-center gap-2">
                            <button onClick={() => changeMonth(-1)} className="p-1 hover:bg-gray-100 rounded text-xs">◀</button>
                            <span className="text-sm font-bold text-primary w-24 text-center">{monthNames[currentDate.getMonth()]} {currentDate.getFullYear()}</span>
                            <button onClick={() => changeMonth(1)} className="p-1 hover:bg-gray-100 rounded text-xs">▶</button>
                        </div>
                    </div>
                    
                    <div className="grid grid-cols-7 gap-px bg-gray-200 border border-gray-200 rounded-lg overflow-hidden flex-1">
                        {['S','M','T','W','T','F','S'].map(d => (
                            <div key={d} className="bg-gray-50 text-center text-[10px] font-bold text-gray-400 py-1">{d}</div>
                        ))}
                        {renderCalendarDays()}
                    </div>
                </div>
            );
        };

        const SectorMap = ({ systems }) => {
            const displaySystems = systems && systems.length > 0 ? systems : [
                { system_code: 'Zipgrow 1', system_type: 'Zipgrow', status: 'Idle', current_crop: null },
                { system_code: 'Zipgrow 2', system_type: 'Zipgrow', status: 'Idle', current_crop: null },
                { system_code: 'Zipgrow 3', system_type: 'Zipgrow', status: 'Idle', current_crop: null },
                { system_code: 'Aeroponics 1', system_type: 'Aeroponics', status: 'Idle', current_crop: null },
                { system_code: 'Germination 1', system_type: 'Germination', status: 'Idle', current_crop: null }
            ];

            return (
                <div className="bg-surface p-6 rounded-xl shadow-soft-green border border-white/50 h-80 overflow-y-auto">
                    <h3 className="text-secondary text-sm font-semibold uppercase mb-4">Farm Map Status</h3>
                    <div className="grid grid-cols-2 gap-3">
                        {displaySystems.map(s => (
                            <div key={s.system_code} className="p-3 bg-canvas rounded-lg flex flex-col justify-between group hover:bg-white border border-transparent hover:border-gray-200 transition-all">
                                <div className="flex justify-between items-start">
                                    <span className="text-xs font-bold text-gray-400 block">{s.system_code}</span>
                                    <div className={`w-2 h-2 rounded-full ${s.status === 'Active' ? 'bg-green-500' : 'bg-gray-300'}`} title={s.status}></div>
                                </div>
                                <div>
                                    <span className="text-sm font-bold text-primary block truncate">{s.system_type}</span>
                                    <span className="text-xs text-accent font-bold">{s.current_crop ? `Growing ${s.current_crop}` : 'Empty / Idle'}</span>
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        const WeatherWidget = ({ sensors }) => (
            <div className="bg-gradient-to-br from-primary to-secondary p-6 rounded-xl shadow-lg text-white flex items-center justify-between">
                <div>
                    <div className="text-xs font-bold opacity-70 uppercase mb-1">Current Environment</div>
                    <div className="text-3xl font-serif">{sensors ? sensors.air_temp : '--'}°C</div>
                    <div className="text-sm opacity-90">Humidity {sensors ? sensors.humidity : '--'}%</div>
                </div>
                <div className="text-right">
                    <div className="text-xs opacity-70">pH: {sensors ? sensors.ph : '--'}</div>
                    <div className="text-xs opacity-70">EC: {sensors ? sensors.ec : '--'}</div>
                </div>
            </div>
        );

        const NavItem = ({ active, icon: Icon, label, onClick }) => (
            <button onClick={onClick} className={`w-full flex items-center gap-4 px-6 py-4 transition-all duration-300 group ${active ? 'bg-surface shadow-floating translate-x-2 rounded-xl' : 'hover:bg-primary/50'}`}>
                <span className={`${active ? 'text-primary' : 'text-white/60 group-hover:text-white'}`}><Icon /></span>
                <span className={`font-medium tracking-wide ${active ? 'text-primary' : 'text-white/80 group-hover:text-white'}`}>{label}</span>
            </button>
        );

        const JournalEntry = ({ post, onDelete, onShare }) => {
            const isCropLog = post.crop_name || (post.title && post.title.includes('Kale')); 
            const stats = post.stats || {};
            return (
                <div className="relative pl-8 md:pl-12 py-2 group fade-in">
                    <div className="absolute left-[11px] top-0 bottom-0 w-[2px] bg-secondary/20 group-hover:bg-accent/50 transition-colors"></div>
                    <div className="absolute left-0 top-8 w-6 h-6 rounded-full border-4 border-canvas bg-white shadow-sm z-10 group-hover:border-accent transition-colors"></div>
                    <div className="bg-surface rounded-xl shadow-floating p-6 md:p-8 hover:-translate-y-1 transition-transform duration-300">
                        <div className="flex justify-between items-start mb-4">
                            <div>
                                <div className="flex items-center gap-2 mb-1">
                                    <span className="text-accent text-xs font-bold uppercase tracking-widest">{new Date(post.date).toLocaleDateString()}</span>
                                    {isCropLog && <span className="bg-primary/10 text-primary text-[10px] font-bold px-2 py-0.5 rounded-full uppercase">{post.crop_name} {post.location ? `@ ${post.location}` : ''}</span>}
                                </div>
                                <h3 className="text-2xl font-serif text-primary mt-1">{post.title}</h3>
                            </div>
                            <div className="flex gap-2 opacity-0 group-hover:opacity-100 transition-opacity">
                                <button onClick={() => onShare(post)} className="p-2 hover:bg-canvas text-gray-400 hover:text-primary"><Icons.Share /></button>
                                <button onClick={() => onDelete(post.id)} className="p-2 hover:bg-red-50 text-gray-400 hover:text-red-500"><Icons.Trash /></button>
                            </div>
                        </div>
                        {(stats.plant_count > 0 || stats.rejected_count > 0) && (
                            <div className="flex gap-4 mb-4 text-sm font-medium bg-gray-50 p-2 rounded-lg border border-gray-100 inline-flex">
                                {stats.plant_count > 0 && <span className="text-green-700 flex items-center gap-1">🌱 {stats.plant_count} Plants</span>}
                                {stats.rejected_count > 0 && <span className="text-red-600 flex items-center gap-1">❌ {stats.rejected_count} Rejected</span>}
                            </div>
                        )}
                        <p className="text-gray-600 leading-relaxed font-serif text-lg whitespace-pre-wrap">{post.content}</p>
                        {(post.image || post.video) && (
                            <div className="mt-6 rounded-lg overflow-hidden shadow-inner bg-canvas">
                                {post.image && <img src={post.image} className="w-full h-auto object-cover max-h-[500px]" onError={(e) => e.target.style.display='none'} />}
                                {post.video && <div className="p-4 flex items-center gap-3"><div className="w-10 h-10 bg-primary/10 rounded-full flex justify-center items-center text-primary">▶</div><a href={post.video} target="_blank" className="text-primary hover:text-accent underline">{post.video}</a></div>}
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const ShareModal = ({ post, onClose }) => {
            const shareText = encodeURIComponent(`${post.title}\n\n${post.content}`);
            const platforms = [
                { name: 'WhatsApp', color: 'bg-green-500', url: `https://wa.me/?text=${shareText}` },
                { name: 'Facebook', color: 'bg-blue-600', url: `https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(window.location.href)}&quote=${shareText}` },
                { name: 'X / Twitter', color: 'bg-black', url: `https://twitter.com/intent/tweet?text=${shareText}&url=${encodeURIComponent(window.location.href)}` },
                { name: 'Threads', color: 'bg-neutral-800', url: `https://www.threads.net/intent/post?text=${shareText}` }
            ];
            return (
                <div className="fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4 backdrop-blur-sm">
                    <div className="bg-white rounded-xl shadow-xl w-full max-w-sm overflow-hidden animate-fade-in">
                        <div className="p-4 border-b flex justify-between items-center bg-gray-50"><h3 className="font-bold text-gray-700">Share Post</h3><button onClick={onClose} className="text-gray-400 hover:text-gray-600"><Icons.Trash /></button></div>
                        <div className="p-6 space-y-3">
                            {platforms.map(p => (<a key={p.name} href={p.url} target="_blank" rel="noopener noreferrer" className={`block w-full text-center py-3 rounded-lg text-white font-medium hover:opacity-90 transition-opacity ${p.color}`} onClick={onClose}>Share on {p.name}</a>))}
                        </div>
                    </div>
                </div>
            );
        };

        const App = () => {
            const [view, setView] = useState('journal');
            const [posts, setPosts] = useState([]);
            const [dashboardData, setDashboardData] = useState(null);
            const [online, setOnline] = useState(false);
            const [sharePost, setSharePost] = useState(null);
            const [newPost, setNewPost] = useState({ title: '', content: '', image: '', video: '', crop: 'Kale', stage: 'Sowing', location: 'Germination 1', plant_count: '', rejected_count: '' });
            const [aiAdvice, setAiAdvice] = useState('');
            const [isAiLoading, setIsAiLoading] = useState(false);

            const load = async () => {
                const postsData = await DataService.fetchPosts();
                if (postsData && Array.isArray(postsData)) {
                    setPosts(postsData.map(p => ({ 
                        id: p.id, title: p.title, content: p.content, 
                        image: p.image, video: p.video, date: p.date, 
                        crop_name: p.crop_name, location: p.location, stats: p.stats 
                    })));
                    setOnline(true);
                } else setOnline(false);

                const dashData = await DataService.fetchDashboard();
                if (dashData) setDashboardData(dashData);
            };

            const daysToFinish = CROP_SCHEDULE[newPost.crop]?.[newPost.stage] || 0;
            const finishDate = new Date();
            finishDate.setDate(finishDate.getDate() + daysToFinish);
            const finishDateStr = finishDate.toLocaleDateString(undefined, {month:'long', day:'numeric'});
            const showCounters = ['Seedling', 'Vegetative', 'Harvest'].includes(newPost.stage);

            const defaultSystems = [
                { system_code: 'Zipgrow 1', system_type: 'Zipgrow' },
                { system_code: 'Zipgrow 2', system_type: 'Zipgrow' },
                { system_code: 'Zipgrow 3', system_type: 'Zipgrow' },
                { system_code: 'Aeroponics 1', system_type: 'Aeroponics' },
                { system_code: 'Germination 1', system_type: 'Germination' },
                { system_code: 'Packaging 1', system_type: 'Packaging' }
            ];
            
            const allSystems = (dashboardData && dashboardData.systems && dashboardData.systems.length > 0) 
                ? dashboardData.systems 
                : defaultSystems;

            const availableLocations = useMemo(() => {
                if (['Sowing', 'Germination', 'Seedling'].includes(newPost.stage)) {
                    return allSystems.filter(s => s.system_type === 'Germination');
                }
                if (newPost.stage === 'Vegetative') {
                    return allSystems.filter(s => ['Zipgrow', 'Aeroponics'].includes(s.system_type));
                }
                if (newPost.stage === 'Harvest') {
                     const packaging = allSystems.filter(s => s.system_type === 'Packaging');
                     return packaging.length > 0 ? packaging : allSystems.filter(s => ['Zipgrow', 'Aeroponics'].includes(s.system_type));
                }
                return allSystems; 
            }, [newPost.stage, allSystems]);

            useEffect(() => {
                if (availableLocations.length > 0) {
                     const isCurrentValid = availableLocations.some(s => s.system_code === newPost.location);
                     if (!isCurrentValid) {
                         setNewPost(prev => ({ ...prev, location: availableLocations[0].system_code }));
                     }
                }
            }, [newPost.stage, availableLocations]);

            useEffect(() => { load(); const i = setInterval(load, 5000); return () => clearInterval(i); }, []);

            const handleSubmit = async (e) => {
                e.preventDefault();
                let contentWithSchedule = `${newPost.content}`;
                if (daysToFinish > 0) contentWithSchedule += `\n\n📅 Estimated Finish: ${finishDateStr}`;
                
                await DataService.add({ 
                    ...newPost, 
                    title: `[${newPost.crop}] ${newPost.title} (${newPost.stage})`,
                    content: contentWithSchedule,
                    plant_count: Number(newPost.plant_count) || 0,
                    rejected_count: Number(newPost.rejected_count) || 0
                });
                
                setNewPost({ title: '', content: '', image: '', video: '', crop: 'Kale', stage: 'Sowing', location: 'Germination 1', plant_count: '', rejected_count: '' });
                setAiAdvice('');
                load();
            };

            const handleAskAI = async () => {
                if (!newPost.content) return alert("Write observation notes first!");
                setIsAiLoading(true);
                const advice = await AIService.askAgronomist(newPost.crop, newPost.stage, newPost.content);
                setAiAdvice(advice);
                setIsAiLoading(false);
            };

            const MonitoringView = () => (
                <div className="space-y-6 animate-fade-in">
                    <header className="mb-8">
                        <h2 className="text-[42px] font-serif text-primary mb-2">Field Overview</h2>
                        <p className="text-secondary text-lg">Live data visualization for RobotPeople Farm.</p>
                    </header>
                    <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                        <div className="bg-surface p-6 rounded-xl shadow-soft-green border border-white/50">
                            <h3 className="text-secondary text-sm font-semibold uppercase mb-3">Total Harvest</h3>
                            <div className="flex items-baseline gap-2"><span className="text-4xl font-serif text-primary">{dashboardData ? dashboardData.harvest : 0}</span><span className="text-gray-400">kg</span></div>
                        </div>
                        <div className="md:col-span-2"><WeatherWidget sensors={dashboardData?.sensors} /></div>
                    </div>
                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                        <FarmCalendar posts={posts} />
                        <SectorMap systems={allSystems} />
                    </div>
                </div>
            );

            return (
                <div className="min-h-screen flex flex-col md:flex-row font-sans text-primary">
                    <aside className="w-full md:w-[280px] bg-primary text-white flex flex-col justify-between sticky top-0 h-auto md:h-screen z-20 shadow-2xl">
                        <div className="p-8">
                            <div className="flex items-center gap-4 mb-12">
                                <img src="KebunData_logo-LG (2).png" alt="Logo" className="w-12 h-12 rounded-xl object-cover bg-white/10 shadow-sm" onError={(e) => { e.target.style.display='none'; e.target.nextSibling.style.display='flex'; }} />
                                <div className="w-12 h-12 bg-secondary rounded-xl items-center justify-center text-white hidden"><Icons.Leaf /></div>
                                <h1 className="text-2xl font-serif font-bold tracking-tight">KebunData</h1>
                            </div>
                            <nav className="space-y-4">
                                <NavItem active={view === 'monitor'} icon={Icons.Grid} label="Monitoring" onClick={() => setView('monitor')} />
                                <NavItem active={view === 'journal'} icon={Icons.Book} label="Farm Journal" onClick={() => setView('journal')} />
                            </nav>
                        </div>
                        <div className="p-8 border-t border-white/10"><div className="flex items-center gap-3 text-sm text-white/50"><Icons.Wifi on={online} /><span>System {online ? 'Online' : 'Offline'}</span></div></div>
                    </aside>

                    <main className="flex-1 p-6 md:p-12 overflow-y-auto h-screen bg-canvas">
                        {view === 'monitor' ? <MonitoringView /> : (
                            <div className="space-y-12 animate-fade-in">
                                <header className="mb-12 max-w-4xl mx-auto"><h2 className="text-[42px] font-serif text-primary mb-2">Daily Chronicles</h2><p className="text-secondary text-lg">Capture the journey of your harvest.</p></header>
                                <div className="max-w-4xl mx-auto">
                                    <div className="bg-surface p-8 rounded-xl shadow-soft-green border border-white/50 fade-in">
                                        <div className="flex items-center justify-between mb-6"><h3 className="text-lg font-bold text-primary">New Entry</h3><span className="text-xs text-accent uppercase font-bold tracking-widest">Today</span></div>
                                        <form onSubmit={handleSubmit} className="space-y-6">
                                            {/* ROW 1: Crop and Stage */}
                                            <div className="grid grid-cols-2 gap-6">
                                                <select className="bg-canvas p-3 rounded-lg w-full" value={newPost.crop} onChange={e => setNewPost({...newPost, crop: e.target.value})}><option>Kale</option><option>Spinach</option><option>Lettuce</option><option>Chili</option></select>
                                                <select className="bg-canvas p-3 rounded-lg w-full" value={newPost.stage} onChange={e => setNewPost({...newPost, stage: e.target.value})}><option>Sowing</option><option>Germination</option><option>Seedling</option><option>Vegetative</option><option>Harvest</option></select>
                                            </div>
                                            
                                            {/* ROW 2: LOCATION SELECTOR (Smart Filtered) */}
                                            <div>
                                                <label className="text-xs font-bold text-gray-400 uppercase block mb-1">Location / System</label>
                                                <select className="bg-canvas p-3 rounded-lg w-full" value={newPost.location} onChange={e => setNewPost({...newPost, location: e.target.value})}>
                                                    {availableLocations.map(s => <option key={s.system_code} value={s.system_code}>{s.system_code} - {s.system_type}</option>)}
                                                    {availableLocations.length === 0 && <option value="General">General / Other</option>}
                                                </select>
                                            </div>

                                            {daysToFinish > 0 && <div className="bg-primary/5 p-3 rounded-lg flex items-center gap-3 text-sm text-primary"><Icons.Calendar /><span><strong>{newPost.crop} {newPost.stage}</strong> usually takes {daysToFinish} days. Est. Finish: <strong>{finishDateStr}</strong></span></div>}
                                            
                                            {showCounters && (
                                                <div className="grid grid-cols-2 gap-6 p-4 bg-green-50 rounded-xl border border-green-100">
                                                    <div><label className="text-xs font-bold text-green-700 uppercase block mb-1">Total Plants</label><input type="number" className="w-full bg-white p-2 rounded border border-green-200" placeholder="0" value={newPost.plant_count} onChange={e => setNewPost({...newPost, plant_count: e.target.value})} /></div>
                                                    <div><label className="text-xs font-bold text-red-700 uppercase block mb-1">Rejected</label><input type="number" className="w-full bg-white p-2 rounded border border-red-200" placeholder="0" value={newPost.rejected_count} onChange={e => setNewPost({...newPost, rejected_count: e.target.value})} /></div>
                                                </div>
                                            )}
                                            
                                            <input className="w-full text-2xl font-serif border-b py-2 bg-transparent" placeholder="Headline" value={newPost.title} onChange={e => setNewPost({...newPost, title: e.target.value})} />
                                            <textarea className="w-full text-lg border-b py-2 bg-transparent" placeholder="Observations..." rows="3" value={newPost.content} onChange={e => setNewPost({...newPost, content: e.target.value})} />
                                            
                                            <div className="flex gap-3">
                                                <button type="button" onClick={handleAskAI} className="text-sm font-bold text-purple-600 bg-purple-50 px-4 py-2 rounded-lg">{isAiLoading ? '...' : '✨ Ask AI'}</button>
                                                {aiAdvice && <div className="text-xs text-purple-800 bg-purple-50 p-2 rounded flex-1">{aiAdvice}</div>}
                                            </div>
                                            
                                            <div className="grid grid-cols-2 gap-6"><input className="text-sm bg-canvas p-3 rounded-lg w-full" placeholder="Image URL" value={newPost.image} onChange={e => setNewPost({...newPost, image: e.target.value})} /><input className="text-sm bg-canvas p-3 rounded-lg w-full" placeholder="Video URL" value={newPost.video} onChange={e => setNewPost({...newPost, video: e.target.value})} /></div>
                                            <div className="flex justify-end pt-2"><button disabled={!online} className="bg-accent text-white px-8 py-3 rounded-xl font-bold">Publish</button></div>
                                        </form>
                                    </div>
                                    <div className="space-y-0">{posts.map(post => <JournalEntry key={post.id} post={post} onDelete={() => {if(confirm('Delete?')) { DataService.del(post.id); load(); }}} onShare={() => setSharePost(post)} />)}</div>
                                </div>
                            </div>
                        )}
                    </main>
                    {sharePost && <ShareModal post={sharePost} onClose={() => setSharePost(null)} />}
                </div>
            );
        };
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
